# ================================================================
# Nginx configuration for udorm-attendance

# Worker ports:
#   Uvicorn is started with --workers 4 on a single port (8001).
#   Uvicorn handles internal worker distribution — Nginx only needs
#   to know about the single entry point at 127.0.0.1:8001.
#
# How to use:
#   1. Install Nginx: sudo apt install nginx
#   2. Copy this file: sudo cp deploy/nginx.conf /etc/nginx/sites-available/udorm-attendance
#   3. Enable it:      sudo ln -s /etc/nginx/sites-available/udorm-attendance /etc/nginx/sites-enabled/
#   4. Test config:    sudo nginx -t
#   5. Reload Nginx:   sudo systemctl reload nginx
# ================================================================


upstream uvicorn_workers {
    ip_hash;
    server 127.0.0.1:8001;
}


server {
    listen      80;
    server_name _;   # replace with your actual domain or IP in production

    # ── Logging ──
    access_log /var/log/nginx/udorm-attendance-access.log;
    error_log  /var/log/nginx/udorm-attendance-error.log;

    # ── File upload size ──
    client_max_body_size 10M;

    # ── WebSocket upgrade map ──
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";

    # ── Standard proxy headers ──
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Timeouts ──
    proxy_connect_timeout   10s;
    proxy_send_timeout      300s;   # 5 minutes — covers long enrollment sessions
    proxy_read_timeout      300s;   # 5 minutes — covers long attendance sessions

    # ================================================================
    # WebSocket — Attendance Recognition
    # WS /ws/recognize
    # ================================================================
    location /ws/recognize {
        proxy_pass http://uvicorn_workers;

        # WebSocket keepalive — prevents idle connections from being
        # dropped during quiet periods between frames.
        proxy_set_header Connection "Upgrade";
        proxy_set_header Upgrade    $http_upgrade;
    }

    # ================================================================
    # WebSocket — Live Enrollment
    # WS /ws/enroll/{student_id}
    # ================================================================
    location ~ ^/ws/enroll/[0-9]+ {
        proxy_pass http://uvicorn_workers;

        proxy_set_header Connection "Upgrade";
        proxy_set_header Upgrade    $http_upgrade;
    }

    # ================================================================
    # All other HTTP endpoints
    # ================================================================
    location / {
        proxy_pass http://uvicorn_workers;
    }
}